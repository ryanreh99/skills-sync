# Specify a command to be executed
command: null

# Specify the current working directory path
cwd: null

# Export additional ENV variables
env:
  recording: true

# Explicitly set the number of columns and rows
cols: 88
rows: 22

# Loop indefinitely on GitHub
repeat: 0

# Render quality
quality: 100

# Preserve captured timing while keeping long idle gaps short
frameDelay: auto
maxIdleTime: 700

# Use a terminal-like floating frame that reads well in the README
frameBox:
  type: floating
  title: skills-sync
  style:
    border: 0px black solid

# No watermark
watermark:
  imagePath: null
  style:
    position: absolute
    right: 15px
    bottom: 15px
    width: 100px
    opacity: 0.9

# Terminal feel
cursorStyle: bar
fontFamily: "Cascadia Code, Consolas, Monaco, monospace"
fontSize: 14
lineHeight: 1.2
letterSpacing: 0

# Theme aligned with the interactive shell palette
theme:
  background: "#0f1521"
  foreground: "#d7deea"
  cursor: "#8bb6ff"
  black: "#0f1521"
  red: "#ef7c8e"
  green: "#7fca7d"
  yellow: "#e5b868"
  blue: "#6ea6ff"
  magenta: "#c792ea"
  cyan: "#7fdbca"
  white: "#d7deea"
  brightBlack: "#7f8aa0"
  brightRed: "#f29aa8"
  brightGreen: "#9cd999"
  brightYellow: "#ebc988"
  brightBlue: "#8bb6ff"
  brightMagenta: "#d9b8f7"
  brightCyan: "#a6e9df"
  brightWhite: "#f0f5fb"
